services:
  checkmk-dev:
    image: checkmk/check-mk-pro:${CMK_VERSION}
    container_name: checkmk-dev
    hostname: checkmk-dev
    ports:
      - "8080:5000"
    environment:
      - CMK_PASSWORD=${CMK_PASSWORD}
      - TZ=${TZ}
    volumes:
      - checkmk-sites:/omd/sites
      - ./local:/omd/sites/cmk/local
    tmpfs:
      - /opt/omd/sites/cmk/tmp:uid=1000,gid=1000
    restart: unless-stopped

volumes:
  checkmk-sites: